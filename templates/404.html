{% extends 'base.html' %}

{% block title %}404 | {{ config.title }}{% endblock title %}

{% block content %}
<section class="notfound">
  <h1 class="notfound-error">404: Page not found</h1>
  <section class="notfound-line"></section>
  <p class="notfound-message">Oops! We can't seem to find the page you are looking for. Let's
    <a href="{{ get_url(path='@/_index.md') }}">head back home</a>.
  </p>
</section>
{% endblock content %}
